name: Gerar App Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar App Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js (Motor do React Native)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17.0.10'

      - name: Instalar Dependências do React Native (CRUCIAL)
        run: npm install

      - name: Verificar se o plugin existe
        run: ls node_modules/@react-native/gradle-plugin

      - name: Compilar o APK Gamer
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Organizar Arquivo Final
        run: |
          mkdir -p output_apk
          cp android/app/build/outputs/apk/debug/app-debug.apk output_apk/NewsChat.apk

      - name: Disponibilizar o APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: NewsChat-Android-Build
          path: output_apk/NewsChat.apk