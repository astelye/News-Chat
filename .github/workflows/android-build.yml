name: Gerar App Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar App Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar pacotes NPM
        run: npm install

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar o arquivo APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Disponibilizar o APK para download
        uses: actions/upload-artifact@v4
        with:
          name: App-Grupo-Android
          path: android/app/build/outputs/apk/release/app-release.apk