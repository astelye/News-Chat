name: Gerar App Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar App Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17.0.10'

      - name: Instalar dependências
        run: npm install

      - name: Compilar APK
        run: |
          cd android
          # Se o gradlew não estiver lá, tentamos usar o comando gradle direto (se instalado)
          # ou falhamos informando que a estrutura está incompleta
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "ERRO CRÍTICO: O arquivo gradlew não existe na pasta android."
            echo "Certifique-se de que a pasta android completa foi enviada ao Git."
            ls -R  # Lista tudo para diagnóstico
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-NewsChat-Android
          path: android/app/build/outputs/apk/release/app-release.apk