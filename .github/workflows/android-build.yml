name: Gerar App Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar App Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar dependências
        run: npm install

      - name: Garantir que o google-services.json está no lugar
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "Arquivo encontrado!"
          else
            echo "Erro: google-services.json não encontrado em android/app/!"
            exit 1
          fi

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-NewsChat-Android
          path: android/app/build/outputs/apk/release/app-release.apk