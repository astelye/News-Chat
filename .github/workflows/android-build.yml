name: Gerar App Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar App Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17.0.10'

      - name: Instalar dependências
        run: npm install

      - name: Compilar APK
        run: |
          cd android
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "ERRO CRÍTICO: O arquivo gradlew não existe na pasta android."
            echo "Certifique-se de que a pasta android completa foi enviada ao Git."
            ls -R
            exit 1
          fi

      - name: Organizar e Renomear o APK
        run: |
          mkdir -p output_apk
          # Comando corrigido: Copia diretamente o arquivo final correto
          cp android/app/build/outputs/apk/debug/app-debug.apk output_apk/NewsChat.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewsChat-Android-Build
          path: output_apk/NewsChat.apk
